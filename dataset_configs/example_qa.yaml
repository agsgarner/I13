# Example: Question-Answering Dataset Configuration
# Shows how to use json_key for direct values and literal for constants

dataset_root: "../qa-dataset"
mapping_file: "qa_pairs.json"

# Example JSON structure:
# [
#   {
#     "question": "What is a transistor?",
#     "answer": "A transistor is a semiconductor device...",
#     "difficulty": "beginner"
#   }
# ]

input_fields:
  - name: "difficulty"
    json_key: "difficulty"    # Read directly from JSON (not from file)
  
  - name: "question"
    json_key: "question"      # Direct JSON value
  
  - name: "answer"
    json_key: "answer"        # Direct JSON value
  
  - name: "task"
    literal: "Answer the following question accurately and concisely."

template: |
  ### Task
  {task}
  
  ### Difficulty: {difficulty}
  
  ### Question
  {question}
  
  ### Answer
  {answer}
  <END_QA>

output_corpus: "data/corpus_qa.txt"
output_jsonl: "data/qa_pairs.jsonl"
